version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: difaryx-postgres
    environment:
      POSTGRES_PASSWORD: difaryx_dev_pw
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - difaryx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  difaryx_pgdata: