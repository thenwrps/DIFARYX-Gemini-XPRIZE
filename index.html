<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DIFARYX — Scientific workflow platform for materials characterization, analysis, and lab knowledge organization." />
    <title>DIFARYX | Scientific Workflow Intelligence</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      .difaryx-boot {
        align-items: center;
        background: #fff;
        color: #94a3b8;
        display: flex;
        flex-direction: column;
        font: 700 11px/1.2 Arial, Helvetica, sans-serif;
        justify-content: center;
        letter-spacing: 0.2em;
        min-height: 100vh;
        text-transform: uppercase;
      }

      .difaryx-boot-spinner {
        animation: difaryx-boot-spin 0.8s linear infinite;
        border: 3px solid #f1f5f9;
        border-radius: 999px;
        border-top-color: #2563eb;
        height: 42px;
        margin-bottom: 20px;
        width: 42px;
      }

      @keyframes difaryx-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="difaryx-boot">
        <div class="difaryx-boot-spinner" aria-hidden="true"></div>
        DIFARYX
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
