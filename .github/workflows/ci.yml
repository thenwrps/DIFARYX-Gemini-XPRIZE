name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Server typecheck
        run: npm run typecheck:server

      - name: Run targeted characterization tests
        run: npx vitest run src/scientificReview/__tests__/agentDemo.characterization.test.ts src/scientificReview/__tests__/evidenceStacks.characterization.test.ts
